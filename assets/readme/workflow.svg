<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Handoff Workflow</title>
  <desc id="desc">The skill workflow: inspect repository, bootstrap files, work with updates, close out, then recover in a new session.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8f5ed"/>
      <stop offset="1" stop-color="#e8f0eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1b2b36" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="30" fill="url(#bg)"/>
  <text x="56" y="70" fill="#11202c" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">The handoff loop</text>
  <text x="56" y="104" fill="#536775" font-family="Segoe UI, Arial, sans-serif" font-size="17">A small protocol turns fragile chat context into durable project state.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="166" width="180" height="190" rx="24" fill="#ffffff" stroke="#d7e0e3"/>
    <rect x="292" y="166" width="180" height="190" rx="24" fill="#ffffff" stroke="#d7e0e3"/>
    <rect x="524" y="166" width="180" height="190" rx="24" fill="#ffffff" stroke="#d7e0e3"/>
    <rect x="756" y="166" width="180" height="190" rx="24" fill="#ffffff" stroke="#d7e0e3"/>
  </g>

  <circle cx="150" cy="219" r="30" fill="#172a3a"/>
  <path d="M136 219H164M150 205V233" stroke="#f8d77a" stroke-width="6" stroke-linecap="round"/>
  <text x="98" y="282" fill="#172a3a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Inspect</text>
  <text x="92" y="312" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">Read repo shape,</text>
  <text x="92" y="333" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">rules, docs, tests.</text>

  <circle cx="382" cy="219" r="30" fill="#f2ad3b"/>
  <path d="M368 218H396M368 230H396M368 206H396" stroke="#2b1c0a" stroke-width="5" stroke-linecap="round"/>
  <text x="322" y="282" fill="#172a3a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Bootstrap</text>
  <text x="324" y="312" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">Create handoff docs</text>
  <text x="324" y="333" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">with safe markers.</text>

  <circle cx="614" cy="219" r="30" fill="#31516a"/>
  <path d="M600 219L611 230L630 207" stroke="#d7e9f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="556" y="282" fill="#172a3a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Maintain</text>
  <text x="556" y="312" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">Update decisions,</text>
  <text x="556" y="333" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">files, validation.</text>

  <circle cx="846" cy="219" r="30" fill="#59d68c"/>
  <path d="M833 219H859M846 206L859 219L846 232" stroke="#082014" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="790" y="282" fill="#172a3a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Recover</text>
  <text x="790" y="312" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">Next agent starts</text>
  <text x="790" y="333" fill="#627684" font-family="Segoe UI, Arial, sans-serif" font-size="14">from facts, not memory.</text>

  <path d="M250 260H282" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round"/>
  <path d="M270 247L286 260L270 273" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M482 260H514" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round"/>
  <path d="M502 247L518 260L502 273" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M714 260H746" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round"/>
  <path d="M734 247L750 260L734 273" stroke="#9aaeb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M850 378C760 454 348 454 176 378" stroke="#d89a29" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M188 399L166 374L201 372" stroke="#d89a29" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="398" y="474" fill="#7a6040" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Closeout refreshes the next startup</text>
</svg>
