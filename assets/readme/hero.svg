<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Handoff Skill Hero</title>
  <desc id="desc">A visual metaphor showing project memory being carried safely from one agent session to the next.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0d2234"/>
      <stop offset="1" stop-color="#15251d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(650 282) rotate(90) scale(250 420)">
      <stop stop-color="#f9b84d" stop-opacity="0.48"/>
      <stop offset="0.55" stop-color="#f9b84d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f9b84d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="180" y1="112" x2="1050" y2="453" gradientUnits="userSpaceOnUse">
      <stop stop-color="#142941"/>
      <stop offset="1" stop-color="#10281f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>
  <rect width="1280" height="560" fill="url(#glow)"/>

  <g opacity="0.34">
    <path d="M80 122H1200" stroke="#33516d" stroke-width="1"/>
    <path d="M80 218H1200" stroke="#33516d" stroke-width="1"/>
    <path d="M80 314H1200" stroke="#33516d" stroke-width="1"/>
    <path d="M80 410H1200" stroke="#33516d" stroke-width="1"/>
    <path d="M184 68V492" stroke="#33516d" stroke-width="1"/>
    <path d="M372 68V492" stroke="#33516d" stroke-width="1"/>
    <path d="M560 68V492" stroke="#33516d" stroke-width="1"/>
    <path d="M748 68V492" stroke="#33516d" stroke-width="1"/>
    <path d="M936 68V492" stroke="#33516d" stroke-width="1"/>
    <path d="M1124 68V492" stroke="#33516d" stroke-width="1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="88" width="1060" height="382" rx="34" fill="url(#card)" stroke="#2f5368"/>
  </g>

  <g transform="translate(162 132)">
    <rect x="0" y="0" width="270" height="260" rx="24" fill="#0b1725" stroke="#31516a"/>
    <circle cx="35" cy="34" r="7" fill="#ff6b6b"/>
    <circle cx="58" cy="34" r="7" fill="#f6bd4a"/>
    <circle cx="81" cy="34" r="7" fill="#59d68c"/>
    <text x="30" y="84" fill="#d7e9f7" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Session A</text>
    <rect x="30" y="112" width="162" height="14" rx="7" fill="#365b7a"/>
    <rect x="30" y="142" width="204" height="14" rx="7" fill="#25415a"/>
    <rect x="30" y="172" width="126" height="14" rx="7" fill="#25415a"/>
    <rect x="30" y="210" width="174" height="34" rx="17" fill="#f2ad3b"/>
    <text x="55" y="233" fill="#1b160b" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">context changes</text>
  </g>

  <g transform="translate(505 113)" filter="url(#shadow)">
    <rect x="0" y="0" width="270" height="300" rx="28" fill="#fbf0d0" stroke="#f6c85f" stroke-width="2"/>
    <path d="M52 72H218M52 116H218M52 160H196M52 204H218M52 248H150" stroke="#7a6040" stroke-width="16" stroke-linecap="round"/>
    <rect x="34" y="30" width="202" height="40" rx="20" fill="#15251d"/>
    <text x="58" y="57" fill="#f8d77a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">AGENT_HANDOFF.md</text>
  </g>

  <g transform="translate(848 132)">
    <rect x="0" y="0" width="270" height="260" rx="24" fill="#0b1725" stroke="#31516a"/>
    <circle cx="35" cy="34" r="7" fill="#ff6b6b"/>
    <circle cx="58" cy="34" r="7" fill="#f6bd4a"/>
    <circle cx="81" cy="34" r="7" fill="#59d68c"/>
    <text x="30" y="84" fill="#d7e9f7" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Session B</text>
    <rect x="30" y="112" width="190" height="14" rx="7" fill="#365b7a"/>
    <rect x="30" y="142" width="132" height="14" rx="7" fill="#25415a"/>
    <rect x="30" y="172" width="204" height="14" rx="7" fill="#25415a"/>
    <rect x="30" y="210" width="176" height="34" rx="17" fill="#59d68c"/>
    <text x="55" y="233" fill="#082014" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">continues safely</text>
  </g>

  <path d="M438 262C470 262 472 262 500 262" stroke="#f6bd4a" stroke-width="6" stroke-linecap="round"/>
  <path d="M485 244L508 262L485 280" stroke="#f6bd4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M780 262C812 262 814 262 842 262" stroke="#59d68c" stroke-width="6" stroke-linecap="round"/>
  <path d="M827 244L850 262L827 280" stroke="#59d68c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#soft)" opacity="0.5">
    <circle cx="641" cy="265" r="66" fill="#f6bd4a"/>
  </g>

  <text x="110" y="522" fill="#d7e9f7" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Agent Handoff Skill</text>
  <text x="378" y="522" fill="#8eabbc" font-family="Segoe UI, Arial, sans-serif" font-size="18">durable repository memory for long-running AI coding work</text>
</svg>
