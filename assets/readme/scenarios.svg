<svg width="1120" height="640" viewBox="0 0 1120 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Handoff Use Cases</title>
  <desc id="desc">Four common scenarios for the Agent Handoff skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a1422"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f6bd4a"/>
      <stop offset="1" stop-color="#59d68c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1120" height="640" rx="34" fill="url(#bg)"/>
  <text x="58" y="76" fill="#f2f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">Where it helps most</text>
  <text x="58" y="112" fill="#8eabbc" font-family="Segoe UI, Arial, sans-serif" font-size="17">Use the skill when project continuity matters more than a single chat window.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="158" width="480" height="176" rx="28" fill="#122237" stroke="#2f5368"/>
    <rect x="582" y="158" width="480" height="176" rx="28" fill="#122237" stroke="#2f5368"/>
    <rect x="58" y="378" width="480" height="176" rx="28" fill="#122237" stroke="#2f5368"/>
    <rect x="582" y="378" width="480" height="176" rx="28" fill="#122237" stroke="#2f5368"/>
  </g>

  <circle cx="108" cy="212" r="28" fill="url(#accent)"/>
  <path d="M95 212H121M108 199V225" stroke="#0a1422" stroke-width="6" stroke-linecap="round"/>
  <text x="154" y="203" fill="#f2f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="820">New repository</text>
  <text x="154" y="239" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">Create AGENT_HANDOFF.md, project rules,</text>
  <text x="154" y="263" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">and session prompts without repeating setup.</text>

  <circle cx="632" cy="212" r="28" fill="url(#accent)"/>
  <path d="M620 222L632 199L644 222" stroke="#0a1422" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="678" y="203" fill="#f2f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="820">Long-running tasks</text>
  <text x="678" y="239" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">Keep decisions, active files, validation,</text>
  <text x="678" y="263" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">risks, and next actions current.</text>

  <circle cx="108" cy="432" r="28" fill="url(#accent)"/>
  <path d="M95 432C101 420 115 420 121 432C115 444 101 444 95 432Z" stroke="#0a1422" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="108" cy="432" r="5" fill="#0a1422"/>
  <text x="154" y="423" fill="#f2f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="820">Agent switching</text>
  <text x="154" y="459" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">A new agent reads a compact state file</text>
  <text x="154" y="483" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">instead of reconstructing old chat context.</text>

  <circle cx="632" cy="432" r="28" fill="url(#accent)"/>
  <path d="M619 432L629 442L647 420" stroke="#0a1422" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="678" y="423" fill="#f2f7f4" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="820">Handoff repair</text>
  <text x="678" y="459" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">Review stale or noisy state and turn it</text>
  <text x="678" y="483" fill="#9fb7c4" font-family="Segoe UI, Arial, sans-serif" font-size="15">back into factual operational memory.</text>
</svg>
